<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank</title>
  <link rel="stylesheet" href="/pages/bank/bank.css">
</head>

<body>
  <header>
    <h1>Ettana</h1>
  </header>

  <main>
    <section class="game-area">
      <h2>Game Area</h2>
    </section>

    <section class="action-area">
      <section class="played-card">
        <div class="card-container">
          <div class="card"></div>
          <p class="card-desc">Played card description</p>
        </div>
      </section>

      <div>

        <section class="reserved">
          <div class="tiles">
            <div class="tile"><span>3</span></div>
            <div class="tile"><span>1</span></div>
          </div>
          <div class="yarns">
            <div class="yarn" data-yarn-id="1"></div>
            <div class="yarn" data-yarn-id="2"></div>
            <div class="yarn" data-yarn-id="3"></div>
            <div class="yarn" data-yarn-id="4"></div>
            <div class="yarn" data-yarn-id="5"></div>
          </div>
        </section>

        <section class="bank">
          <div class="token-placeholder">
            <div class="token-count">55</div>
            <div class="buy-swap">
              <button class="swap-btn btn">Swap</button>
            </div>
          </div>

          <div class="cards">
            <div class="design-card"></div>
            <div class="action-card"></div>
          </div>
        </section>
      </div>
      <section class="play-turn">
        <div class="dices">
          <div class="dice"></div>
          <div class="dice"></div>
        </div>
        <button class="pass-turn btn">Pass Turn</button>
      </section>
    </section>
  </main>
</body>

</html>
