<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ettana Lobby</title>
    <link rel="stylesheet" href="/pages/lobby-page/style.css" />
  </head>
  <body>
    <div class="lobby-container">
      <div class="top-bar">
        <button id="exitBtn">Exit</button>
        <div class="player-count" id="playerCount">0 / 4 Players</div>
      </div>

      <h2 class="title">Waiting for Weavers</h2>
      <h3 class="room-info">Room Id:
        <span id="roomId"></span>
        <button id="copyRoomIdBtn" title="Copy Room ID">📋</button>
      </h3>

      <div class="player-list" id="playerList"></div>

      <div class="start-button">
        Start game
      </div>
    </div>
    <div id="toast" class="toast"></div>
  </body>
  <script src="/pages/lobby-page/script.js" type="module"></script>
</html>
