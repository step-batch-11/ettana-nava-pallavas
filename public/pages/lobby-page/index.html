<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ettana Lobby</title>
    <link rel="stylesheet" href="/pages/lobby-page/style.css" />
  </head>
  <body>
    <div class="lobby-container">
      <div class="top-bar">
        <button id="exitBtn">Exit</button>
        <div class="player-count" id="playerCount">0 / 4 Players</div>
      </div>

      <h2 class="title">Waiting for Weavers</h2>

      <div class="player-list" id="playerList"></div>

      <div class="timer-box">
        Game starts in <span id="timer">30</span>s
      </div>
    </div>

    <script src="/pages/lobby-page/script.js"></script>
  </body>
</html>
