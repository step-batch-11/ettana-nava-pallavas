<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/styles/deck.css">
    <script type="module" src="/scripts/deck.js"></script>
  </head>
  <body>

    <div class="deck">
      <div class="panel design-cards expanded">
        <div class="cards">
          <div class="card-item" draggable="true" id="d-1">1</div>
          <div class="card-item" draggable="true" id="d-2">2</div>
          <div class="card-item" draggable="true" id="d-3">3</div>
          <div class="card-item" draggable="true" id="d-4">4</div>
          <div class="card-item" draggable="true" id="d-5">5</div>
        </div>
      </div>

      <div class="panel action-cards">
        <div class="cards">
          <div class="card-item" draggable="true" id="a-1"></div>
          <div class="card-item" draggable="true" id="a-2"></div>
          <div class="card-item" draggable="true" id="a-3"></div>
          <div class="card-item" draggable="true" id="a-4"></div>
        </div>
      </div>
    </div>
  </body>
</html>
