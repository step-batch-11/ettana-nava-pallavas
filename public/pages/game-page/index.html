<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ettana board</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=currency_exchange,social_leaderboard" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/pages/game-page/styles/style.css">
    <link rel="stylesheet" href="/pages/game-page/styles/bank.css">
    <link rel="stylesheet" href="/pages/game-page/styles/board.css">
    <link rel="stylesheet" href="/pages/game-page/styles/deck.css">
    <link rel="stylesheet" href="/pages/game-page/styles/color.css">
    <link rel="stylesheet" href="/pages/game-page/styles/players.css">
    <link rel="stylesheet" href="/pages/game-page/styles/left.css">
    <link rel="stylesheet" href="/pages/game-page/styles/game.css">
    <link rel="stylesheet" href="/pages/game-page/styles/leaderboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script type="module" src="/pages/game-page/scripts/app.js"></script>
  </head>

  <body>
    <div id="game" class="row">
      <div id="left">
        <div class="player-details">
          <div class="players-detail-heading">
            <div class="player-pin-icon">Players</div>
            <div class="player-stats-heading">
              <div class="victory-point">
                <div class="material-symbols-outlined">social_leaderboard</div>
              </div>
              <div class="token-count">
                <img src="/assets/token.png" alt="" srcset="">
              </div>
              <div class="ac-number">
                <img src="/assets/action-card.png" alt="" srcset="">
              </div>
              <div class="dc-number">
                <img src="/assets/design-card.png" alt="" srcset="">
              </div>
            </div>
          </div>
          <players-element class="players"></players-element>
        </div>
        <div class="information-panel">
          <div id="actionBanner" class="action-banner hidden">
            <span id="actionText"></span>
          </div>
        </div>
      </div>

      <div id="center" class="column">
        <div id="board-container" class="row">
          <div id="board-border-1">
            <div id="board-border-2">
              <div id="board"></div>
            </div>
          </div>
        </div>

        <div class="deck">
          <div class="panel design-cards expanded">
            <div class="cards" id="design-card-panel"></div>
          </div>

          <div class="panel action-cards">
            <div class="cards" id="action-card-panel"></div>
          </div>
        </div>
      </div>

      <div id="right">
        <div class="reserved">
          <div class="tiles">
            <div class="tile"><span></span></div>
            <div class="tile"><span></span></div>
          </div>
          <div class="yarns">
            <div class="yarn" data-yarn-id="1"></div>
            <div class="yarn" data-yarn-id="2"></div>
            <div class="yarn" data-yarn-id="3"></div>
            <div class="yarn" data-yarn-id="4"></div>
            <div class="yarn" data-yarn-id="5"></div> 
          </div>
        </div>
        
        <div class="bank">
          <div class="token-placeholder">
            <div class="buy-swap">
              <button class="swap-btn btn material-symbols-outlined">currency_exchange</button>
            </div>
            <div id="token-count"><h6>55</h6></div>
          </div>

          <div class="cards">
            <div class="design-card">
              <img src="/assets/design-card.png" alt draggable="false">
            </div>
            <div class="action-card">
              <img src="/assets/action-card.png" alt draggable="false">
            </div>
          </div>
        </div>

        <div class="play-turn">
          <div class="dices" id="dice">
            <div class="dice" id="number-dice"></div>
            <div class="dice" id="color-dice"></div>
          </div>
          <div class="pass">
            <button class="pass-turn" id="pass-turn">➡</button>
          </div>
        </div>
      </div>
    </div>

    <section id="popup-selector"></section>

    <section id="replace-selector"></section>

    <dialog id="diceDialog">
      <h3>Select Dice</h3>

      <div class="dice-container" id="diceContainer"></div>

      <div class="actions">
        <button class="submit" id="submit-popup">Submit</button>
      </div>
    </dialog>

    <dialog id="color-dice-dialog">
      <h3>Select Color Dice</h3>

      <div class="color-dice-container" id="color-dice-container">
        <div class="dice-container" id="diceContainer">
          <div class="dice-popup">
            <div class="color" data-dice-id="1"></div>
          </div>
          <div class="dice-popup">
            <div class="color" data-dice-id="2"></div>
          </div>
          <div class="dice-popup">
            <div class="color" data-dice-id="3"></div>
          </div>
          <div class="dice-popup">
            <div class="color" data-dice-id="4"></div>
          </div>
          <div class="dice-popup">
            <div class="color" data-dice-id="5"></div>
          </div>
          <div class="dice-popup">
            <div class="color" data-dice-id="6"></div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="submit" id="submit-popup">Submit</button>
      </div>
    </dialog>

    <div id="endGameOverlay" class="overlay hidden">
      <div class="popup">

        <div class="popup-header">
          <h1 id="resultTitle">🏆 Master Weaver!</h1>
          <p id="resultSubtitle">
            You have crafted the finest design and reached 8 Annas.
          </p>
        </div>

        <div id="leaderboard" class="leaderboard"></div>

        <div class="flavor">
          "In the looms of Kanchi, only the most skillful weaver claims glory."
        </div>

        <div class="actions">
          <!-- <button class="btn secondary" id="closeLeaderboard">Close</button> -->
          <button class="btn primary" id="goToHome">Go Home</button>
        </div>

      </div>
    </div>
    <div id="actionBanner" class="action-banner hidden">
      <span id="actionText"></span>
    </div>
    <div id="toast" class="toast"></div>
  </body>
</html>
