<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ettana</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        width: 90%;
        max-width: 400px;
      }

      .logo {
        font-size: 42px;
        font-weight: bold;
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      .tagline {
        font-size: 14px;
        opacity: 0.7;
        margin-bottom: 30px;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        margin-bottom: 20px;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #38bdf8;
        color: #0f172a;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button:hover {
        background: #0ea5e9;
        transform: translateY(-2px);
      }

      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">ETTANA</div>
      <div class="tagline">Enter your name and start the adventure</div>

      <input type="text" placeholder="Enter your name..." id="playerName" />

      <button onclick="startGame()">Start Playing</button>
    </div>
  </body>
</html>
